<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'coratto — Editor Projeto Inicial</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8976a;--gold-l:#d4b896;--dark:#0e0d0b;--dark2:#161410;--dark3:#1e1b17;
  --cream:#f5f0e8;--muted:#8a8070;--white:#ffffff;
  --panel:#1a1714;--border:rgba(184,151,106,0.2);
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh}

/* HEADER */
header{background:rgba(14,13,11,0.96);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hlogo img{height:32px;filter:brightness(0) invert(1);opacity:.9}
.htitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--gold-l);letter-spacing:.05em}
.hbtn{background:var(--gold);color:var(--dark);border:none;padding:10px 24px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.hbtn:hover{background:var(--gold-l)}

/* COVER FORM */
.cover-section{padding:40px;border-bottom:1px solid var(--border)}
.cover-section h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-bottom:24px;letter-spacing:.03em}
.cover-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-group label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.field-group input, .field-group select{background:var(--panel);border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;border-radius:2px;outline:none;transition:border .2s}
.field-group input:focus, .field-group select:focus{border-color:var(--gold)}
.field-group input::placeholder{color:var(--muted)}

/* AMBIENTE CARDS */
.ambientes{padding:40px}
.ambientes-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-bottom:8px}
.ambientes-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:32px}
.amb-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.amb-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border .2s}
.amb-card:hover{border-color:rgba(184,151,106,0.5)}
.amb-card.active{border-color:var(--gold)}

.amb-header{display:flex;align-items:center;gap:0;cursor:pointer}
.amb-thumb{width:120px;height:80px;object-fit:cover;flex-shrink:0;filter:brightness(.85)}
.amb-info{padding:12px 16px;flex:1}
.amb-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--white);margin-bottom:4px}
.amb-summary{font-size:10px;color:var(--muted);letter-spacing:.08em}
.amb-toggle{margin-left:auto;padding:0 16px;font-size:18px;color:var(--gold);transition:transform .3s}
.amb-card.active .amb-toggle{transform:rotate(180deg)}

.amb-body{display:none;padding:20px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.amb-card.active .amb-body{display:block}

.amb-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.amb-fields .field-group{grid-column:auto}
.amb-fields .field-full{grid-column:1/-1}

/* COLOR PICKER */
.color-picker-area{margin-top:4px}
.color-picker-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.color-swatches{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.swatch:hover{transform:scale(1.15)}
.swatch.selected{border-color:var(--gold);transform:scale(1.15)}
.swatch-name{font-size:8px;text-align:center;color:var(--muted);margin-top:2px;width:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swatch-wrap{display:flex;flex-direction:column;align-items:center}

.selected-colors{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-top:8px}
.sel-tag{background:rgba(184,151,106,.15);border:1px solid var(--border);padding:4px 10px;font-size:10px;letter-spacing:.08em;color:var(--gold-l);border-radius:2px;display:flex;align-items:center;gap:6px}
.sel-tag .rm{cursor:pointer;color:var(--muted);font-size:12px;line-height:1}.sel-tag .rm:hover{color:#e05}

/* OBS */
.obs-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.obs-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;letter-spacing:.08em;cursor:pointer;border-radius:2px;transition:all .2s;font-family:'Montserrat',sans-serif}
.obs-btn:hover{border-color:var(--gold);color:var(--gold)}
.obs-btn.selected{background:rgba(184,151,106,.15);border-color:var(--gold);color:var(--gold-l)}

/* PREVIEW PANEL */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.preview-overlay.active{display:flex}
.preview-box{background:var(--dark2);border:1px solid var(--border);border-radius:4px;width:90vw;max-width:1000px;max-height:90vh;overflow-y:auto;padding:40px;position:relative}
.preview-close{position:absolute;top:16px;right:20px;font-size:24px;color:var(--muted);cursor:pointer;background:none;border:none}
.preview-close:hover{color:var(--gold)}

/* PROGRESS */
.progress-bar{height:3px;background:var(--border);position:sticky;top:64px;z-index:99}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-l));width:0%;transition:width .4s}

footer{padding:24px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
footer img{height:24px;filter:brightness(0) invert(1);opacity:.3}
footer span{font-size:10px;color:var(--muted);letter-spacing:.1em}
</style>
</head>

      <label>Endereço da Obra</label>

    </div>
  </div>
</div>

<!-- AMBIENTES -->
<div class="ambientes">
  <h2 class="ambientes-title">Ambientes</h2>

</div>

<!-- PREVIEW OVERLAY -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <button class="preview-close" onclick="closePreview()">×</button>
    <div id="previewContent"></div>
  </div>
</div>

<footer>

  {id:"lavabo",    name:"Lavabo",          img:"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22640%22 height=%22360%22 viewBox=%220 0 640 360%22%3E%3Crect width=%22640%22 height=%22360%22 fill=%22%23110f0c%22/%3E%3Cpath d=%22M0 270 L160 190 L290 245 L435 145 L640 255 L640 360 L0 360 Z%22 fill=%22%23282018%22/%3E%3Ccircle cx=%22505%22 cy=%2285%22 r=%2238%22 fill=%22%23b8925f%22 opacity=%22.55%22/%3E%3Ctext x=%22320%22 y=%22188%22 text-anchor=%22middle%22 fill=%22%23c9a46d%22 font-family=%22Arial%22 font-size=%2220%22 letter-spacing=%224%22%3EAMBIENTE%3C/text%3E%3C/svg%3E"},

];

// State: per ambiente
const state = {};
AMBIENTES.forEach(a => {
  state[a.id] = { tampon:[], porta:[], puxador:[], cores:[], obs:[] };
});

// ─── BUILD UI ────────────────────────────────────────────────────────────────

function buildSwatchHTML(ambId, field) {
  return COLORS.map(c => `
    <div class="swatch-wrap">
      <div class="swatch" title="${c.name}"
        style="background:${c.hex}"
        onclick="toggleColor('${ambId}','${c.name}','${c.hex}',this)">
      </div>
      <div class="swatch-name">${c.name.split(' ')[0]}</div>
    </div>`).join('');
}

function buildSelectHTML(options, multiple=false) {
  return options.map(o => `<option value="${o}">${o}</option>`).join('');
}

function buildObsHTML(ambId) {
  return OBS_OPTIONS.map((o,i) => `
    <button class="obs-btn" onclick="toggleObs('${ambId}',${i},this)">${o}</button>
  `).join('');
}

function renderCard(amb) {
  const s = state[amb.id];
  return `
  <div class="amb-card" id="card-${amb.id}">
    <div class="amb-header" onclick="toggleCard('${amb.id}')">
      <img class="amb-thumb" src="${amb.img}" alt="${amb.name}">
      <div class="amb-info">
        <div class="amb-name">${amb.name}</div>
        <div class="amb-summary" id="summary-${amb.id}">Clique para configurar</div>
      </div>
      <span class="amb-toggle">▾</span>
    </div>
    <div class="amb-body">
      <div class="amb-fields">
        <div class="field-group">
          <label>Tamponamentos</label>
          <select multiple size="3" onchange="updateMulti('${amb.id}','tampon',this)">
            ${buildSelectHTML(TAMPONS)}
          </select>
        </div>
        <div class="field-group">
          <label>Portas</label>
          <select multiple size="3" onchange="updateMulti('${amb.id}','porta',this)">
            ${buildSelectHTML(PORTAS)}
          </select>
        </div>
        <div class="field-group">
          <label>Puxadores</label>
          <select multiple size="3" onchange="updateMulti('${amb.id}','puxador',this)">
            ${buildSelectHTML(PUXADORES)}
          </select>
        </div>
        <div class="field-group">
          <label>Obs adicional</label>
          <input type="text" placeholder="Texto livre..." oninput="state['${amb.id}'].obsExtra=this.value">
        </div>
      </div>

      <div class="color-picker-area">
        <span class="color-picker-label">Cores · clique para selecionar (pode escolher mais de uma)</span>
        <div class="color-swatches">${buildSwatchHTML(amb.id)}</div>
        <div class="selected-colors" id="selcolors-${amb.id}"></div>
      </div>

      <div style="margin-top:16px">
        <span class="color-picker-label">Observações do projeto</span>
        <div class="obs-options">${buildObsHTML(amb.id)}</div>
      </div>
    </div>
  </div>`;
}

document.getElementById('ambGrid').innerHTML = AMBIENTES.map(renderCard).join('');

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('active');
  updateProgress();
}

function updateMulti(ambId, field, sel) {
  state[ambId][field] = Array.from(sel.selectedOptions).map(o => o.value);
  updateSummary(ambId);
}

function toggleColor(ambId, name, hex, el) {
  const s = state[ambId].cores;
  const idx = s.findIndex(c => c.name === name);
  if (idx > -1) {
    s.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    s.push({name, hex});
    el.classList.add('selected');
  }
  renderSelectedColors(ambId);
  updateSummary(ambId);
}

function renderSelectedColors(ambId) {
  const container = document.getElementById('selcolors-'+ambId);
  container.innerHTML = state[ambId].cores.map(c => `
    <div class="sel-tag">
      <div style="width:12px;height:12px;border-radius:50%;background:${c.hex};flex-shrink:0"></div>
      ${c.name}
      <span class="rm" onclick="removeColor('${ambId}','${c.name}')">×</span>
    </div>`).join('');
}

function removeColor(ambId, name) {
  const s = state[ambId].cores;
  const idx = s.findIndex(c => c.name === name);
  if (idx > -1) s.splice(idx, 1);
  renderSelectedColors(ambId);
  // Deselect swatch
  document.querySelectorAll('#card-'+ambId+' .swatch').forEach((sw,i) => {
    if (COLORS[i] && COLORS[i].name === name) sw.classList.remove('selected');
  });
  updateSummary(ambId);
}

function toggleObs(ambId, idx, btn) {
  const s = state[ambId].obs;
  const val = OBS_OPTIONS[idx];
  const i = s.indexOf(val);
  if (i > -1) { s.splice(i,1); btn.classList.remove('selected'); }
  else { s.push(val); btn.classList.add('selected'); }
}

function updateSummary(ambId) {
  const s = state[ambId];
  const parts = [];
  if (s.cores.length) parts.push(s.cores.map(c=>c.name).join(', '));
  if (s.porta.length) parts.push('Porta: '+s.porta.join(', '));
  const el = document.getElementById('summary-'+ambId);
  if (el) el.textContent = parts.length ? parts.join(' · ') : 'Clique para configurar';
};

function updateProgress() {
  const done = AMBIENTES.filter(a => {
    const s = state[a.id];
    return s.cores.length > 0 || s.porta.length > 0 || s.tampon.length > 0;
  }).length;
  document.getElementById('progressFill').style.width = (done/AMBIENTES.length*100)+'%';
}

// ─── GENERATE ─────────────────────────────────────────────────────────────────

function generatePreview() {
  const clientName = document.getElementById('clientName').value || 'CLIENTE MODELO';
  const contractNum = document.getElementById('contractNum').value || '—';
  const fabricante = document.getElementById('fabricante').value || '—';
  const endereco = document.getElementById('endereco').value || '—';

  let html = `
  <div style="font-family:'Cormorant Garamond',serif;color:#1a1a1a;max-width:900px">
    <div style="text-align:center;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid #ddd">
      <div style="font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#b8976a;margin-bottom:8px">Projeto Inicial</div>
      <div style="font-size:36px;font-weight:300;margin-bottom:4px">${clientName}</div>
      <div style="font-size:13px;color:#666;font-family:'Montserrat',sans-serif;font-weight:300">Contrato: ${contractNum} · ${fabricante}</div>
      <div style="font-size:12px;color:#999;font-family:'Montserrat',sans-serif;font-weight:300;margin-top:4px">${endereco}</div>
    </div>`;

  AMBIENTES.forEach(amb => {
    const s = state[amb.id];
    const hasData = s.cores.length||s.porta.length||s.tampon.length||s.puxador.length;
    if (!hasData) return;

    const allObs = [...s.obs, s.obsExtra||''].filter(Boolean).join(' · ');

    html += `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:32px;margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid #eee;align-items:start">
      <div>
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#b8976a;margin-bottom:6px;font-family:'Montserrat',sans-serif">Ambiente</div>
        <div style="font-size:32px;font-weight:300;margin-bottom:16px">${amb.name}</div>
        <img src="${amb.img}" style="width:100%;height:280px;object-fit:cover;border-radius:2px;display:block">
        ${allObs ? `<div style="margin-top:10px;font-size:11px;color:#e05;font-family:'Montserrat',sans-serif;letter-spacing:.05em">${allObs}</div>` : ''}
      </div>
      <div style="padding-top:52px">
        ${s.tampon.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Tamponamentos</div><div style="font-size:14px;color:#555">${s.tampon.join(', ')}</div></div>` : ''}
        ${s.porta.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Portas</div><div style="font-size:14px;color:#555">${s.porta.join(', ')}</div></div>` : ''}
        ${s.puxador.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Puxadores</div><div style="font-size:14px;color:#555">${s.puxador.join(', ')}</div></div>` : ''}
        ${s.cores.length ? `
        <div><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:12px">Cores</div>
        <div style="display:flex;flex-wrap:wrap;gap:12px">
          ${s.cores.map(c=>`
          <div style="text-align:center">
            <div style="width:52px;height:52px;border-radius:50%;background:${c.hex};border:1px solid rgba(0,0,0,.1)"></div>
            <div style="font-size:10px;margin-top:4px;color:#555;font-family:'Montserrat',sans-serif">${c.name}</div>
          </div>`).join('')}
        </div></div>` : ''}
      </div>
    </div>`;
  });

  html += `</div>`;
  
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewOverlay').classList.add('active');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePreview(); });
</script>
</body>
</html>
