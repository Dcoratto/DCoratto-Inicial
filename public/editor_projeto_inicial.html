<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>D'coratto - Editor Projeto Inicial</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8976a;--gold-l:#d4b896;--dark:#0e0d0b;--dark2:#161410;--dark3:#1e1b17;
  --cream:#f5f0e8;--muted:#8a8070;--white:#ffffff;
  --panel:#1a1714;--border:rgba(184,151,106,0.2);
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh}

/* HEADER */
header{background:rgba(14,13,11,0.96);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hlogo img{height:32px;filter:brightness(0) invert(1);opacity:.9}
.htitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--gold-l);letter-spacing:.05em}
.header-actions{display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:50%;background:transparent;color:var(--gold-l);cursor:pointer;font-size:18px;line-height:1;display:inline-grid;place-items:center;transition:all .2s}
.icon-btn:hover{border-color:var(--gold);background:rgba(184,151,106,.12)}
.hbtn{background:var(--gold);color:var(--dark);border:none;padding:10px 24px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.hbtn:hover{background:var(--gold-l)}

/* COVER FORM */
.cover-section{padding:40px;border-bottom:1px solid var(--border)}
.cover-section h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-bottom:24px;letter-spacing:.03em}
.cover-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-group label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.field-group input, .field-group select{background:var(--panel);border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;border-radius:2px;outline:none;transition:border .2s}
.factory-checks{display:flex;align-items:center;gap:10px;min-height:42px}
.factory-check{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:2px;background:var(--panel);color:var(--cream);padding:10px 12px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.factory-check input{width:14px;height:14px;accent-color:var(--gold);padding:0}
.field-group input:focus, .field-group select:focus{border-color:var(--gold)}
.field-group input::placeholder{color:var(--muted)}

/* AMBIENTE CARDS */
.ambientes{padding:40px}
.ambientes-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-bottom:8px}
.ambientes-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:32px}
.ambientes-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px}
.ambientes-head .ambientes-sub{margin-bottom:0}
.empty-ambientes{border:1px dashed var(--border);background:rgba(0,0,0,.16);padding:28px;color:var(--muted);font-size:13px;text-align:center}
.amb-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.amb-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border .2s}
.amb-card:hover{border-color:rgba(184,151,106,0.5)}
.amb-card.active{border-color:var(--gold)}

.amb-header{display:flex;align-items:center;gap:0;cursor:pointer}
.amb-thumb{width:120px;height:80px;object-fit:cover;flex-shrink:0;filter:brightness(.85)}
.amb-info{padding:12px 16px;flex:1}
.amb-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--white);margin-bottom:4px}
.amb-summary{font-size:10px;color:var(--muted);letter-spacing:.08em}
.amb-toggle{margin-left:auto;padding:0 16px;font-size:18px;color:var(--gold);transition:transform .3s}
.amb-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.amb-remove{border:1px solid rgba(184,151,106,.28);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;letter-spacing:.12em;padding:8px 10px;text-transform:uppercase}
.amb-card.active .amb-toggle{transform:rotate(180deg)}

.amb-body{display:none;padding:20px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.amb-card.active .amb-body{display:block}

.amb-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.amb-fields .field-group{grid-column:auto}
.amb-fields .field-full{grid-column:1/-1}
.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.check-item{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--dark2);color:var(--cream);font-size:12px;line-height:1.35;padding:10px}
.check-item input{width:14px;height:14px;padding:0;accent-color:var(--gold)}

/* COLOR PICKER */
.color-picker-area{margin-top:4px}
.color-picker-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.color-swatches{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.swatch-section{width:100%;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.swatch-section-title{width:100%;margin:10px 0 2px;color:var(--gold);font-size:9px;letter-spacing:.18em;text-transform:uppercase}
.swatch{width:52px;height:52px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;background-size:cover;background-position:center;box-shadow:0 8px 14px rgba(0,0,0,.25)}
.swatch:hover{transform:scale(1.15)}
.swatch.selected{border-color:var(--gold);transform:scale(1.15)}
.swatch-name{font-size:9px;text-align:center;color:#d7c2a7;margin-top:5px;width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swatch-line{font-size:8px;text-align:center;color:#b8976a;margin-top:2px;width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.08em}
.swatch-wrap{display:flex;flex-direction:column;align-items:center}
.handle-picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.handle-card{width:62px;border:1px solid var(--border);background:rgba(0,0,0,.18);border-radius:4px;padding:4px;cursor:pointer;color:var(--muted)}
.handle-card.selected{border-color:var(--gold);color:var(--gold-l)}
.handle-card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:2px;display:block;margin-bottom:4px}
.handle-card span{display:block;font-size:7px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.selected-colors{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-top:8px}
.sel-tag{background:rgba(184,151,106,.15);border:1px solid var(--border);padding:4px 10px;font-size:10px;letter-spacing:.08em;color:var(--gold-l);border-radius:2px;display:flex;align-items:center;gap:6px}
.sel-tag .rm{cursor:pointer;color:var(--muted);font-size:12px;line-height:1}.sel-tag .rm:hover{color:#e05}

/* OBS */
.obs-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.obs-tools{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.obs-add{width:26px;height:26px;border:1px solid var(--border);background:transparent;color:var(--gold-l);border-radius:50%;cursor:pointer;font-size:16px;line-height:1}
.obs-item{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:2px;overflow:hidden}
.obs-btn{padding:7px 12px;border:0;background:transparent;color:#c7b8a1;font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .2s;font-family:'Montserrat',sans-serif}
.obs-btn:hover{border-color:var(--gold);color:var(--gold)}
.obs-btn.selected{background:rgba(184,151,106,.15);border-color:var(--gold);color:var(--gold-l)}
.obs-edit{align-self:stretch;border:0;border-left:1px solid var(--border);background:rgba(184,151,106,.08);color:var(--gold-l);cursor:pointer;padding:0 8px}

/* PREVIEW PANEL */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.preview-overlay.active{display:flex}
.preview-box{background:var(--dark2);border:1px solid var(--border);border-radius:4px;width:90vw;max-width:1000px;max-height:90vh;overflow-y:auto;padding:40px;position:relative}
.preview-close{position:absolute;top:16px;right:20px;font-size:24px;color:var(--muted);cursor:pointer;background:none;border:none}
.preview-close:hover{color:var(--gold)}

/* SETTINGS */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center;padding:28px}
.settings-overlay.active{display:flex}
.settings-panel{width:min(1080px,96vw);max-height:92vh;overflow:auto;background:var(--dark2);border:1px solid var(--border);border-radius:6px;box-shadow:0 30px 90px rgba(0,0,0,.55)}
.settings-head{display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);padding:22px 26px}
.settings-head h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--gold-l)}
.settings-close{border:0;background:transparent;color:var(--muted);font-size:28px;cursor:pointer}
.settings-body{display:grid;grid-template-columns:310px 1fr;gap:24px;padding:24px}
.settings-card{background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:4px;padding:18px}
.settings-card h3{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.settings-card .field-group{margin-bottom:12px}
.file-input{border:1px dashed rgba(184,151,106,.42);padding:12px;border-radius:4px;color:var(--muted);font-size:11px}
.catalog-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.catalog-form .field-full{grid-column:1/-1}
.settings-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}
.ghost-btn,.danger-btn{border:1px solid var(--border);background:transparent;color:var(--gold-l);padding:9px 12px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
.danger-btn{color:#ff8a78;border-color:rgba(255,106,85,.35)}
.catalog-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:12px}
.catalog-item{border:1px solid var(--border);border-radius:4px;background:rgba(0,0,0,.2);overflow:hidden}
.catalog-thumb{width:100%;aspect-ratio:1/1;background:#111;background-size:cover;background-position:center;border-bottom:1px solid var(--border)}
.catalog-meta{padding:10px;display:grid;gap:4px}
.catalog-meta strong{font-size:11px;color:var(--cream);line-height:1.25}
.catalog-meta span{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.catalog-meta button{margin-top:6px;justify-self:start}
.option-form{display:grid;grid-template-columns:170px 1fr auto;gap:10px;align-items:end;margin-top:18px}
.option-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:16px}
.option-card{border:1px solid var(--border);background:rgba(0,0,0,.2);padding:12px}
.option-card strong{display:block;color:var(--cream);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.option-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid rgba(184,151,106,.14);padding:7px 0;color:var(--muted);font-size:12px}
.logo-preview{display:grid;place-items:center;min-height:86px;border:1px solid var(--border);background:#090807;margin-bottom:12px}
.logo-preview img{max-width:220px;max-height:68px;object-fit:contain}

/* PROGRESS */
.progress-bar{height:3px;background:var(--border);position:sticky;top:64px;z-index:99}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-l));width:0%;transition:width .4s}

footer{padding:24px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
footer img{height:24px;filter:brightness(0) invert(1);opacity:.3}
footer span{font-size:10px;color:var(--muted);letter-spacing:.1em}
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <img id="companyLogo" src="https://dcorattopremium-5am4gqhj.manus.space/manus-storage/logo-transparent_c8b8c4c4.png" alt="D'coratto">
  </div>
  <span class="htitle">Editor · Projeto Inicial</span>
  <div class="header-actions">
    <button class="icon-btn" type="button" onclick="openSettings()" title="Configurações" aria-label="Configurações">⚙</button>
    <button class="hbtn" onclick="generatePreview()">Gerar Projeto Inicial</button>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- COVER DATA -->
<div class="cover-section">
  <h2>Dados do Projeto</h2>
  <div class="cover-grid">
    <div class="field-group">
      <label>Nome do Cliente</label>
      <input type="text" id="clientName" placeholder="Ex: CLIENTE MODELO" value="">
    </div>
    <div class="field-group">
      <label>Nº Contrato</label>
      <input type="text" id="contractNum" placeholder="Ex: 000000000" value="">
    </div>
    <div class="field-group">
      <label>Fabricante / Promob</label>
      <div class="factory-checks" id="fabricante">
        <label class="factory-check"><input type="checkbox" value="VITTA" checked onchange="handleFactoryChange()"> Vitta</label>
        <label class="factory-check"><input type="checkbox" value="BOA VISTA" checked onchange="handleFactoryChange()"> Boa Vista</label>
      </div>
    </div>
    <div class="field-group" style="grid-column:1/-1">
      <label>Endereço da Obra</label>
      <input type="text" id="endereco" placeholder="Ex: Rua Exemplo, 000 - Cidade/UF" value="">
    </div>
  </div>
</div>

<!-- AMBIENTES -->
<div class="ambientes">
  <div class="ambientes-head"><div><h2 class="ambientes-title">Ambientes</h2><p class="ambientes-sub">Adicione apenas os ambientes usados neste projeto.</p></div><button class="hbtn" type="button" onclick="addEnvironment()">Adicionar ambiente</button></div>
  <div class="amb-grid" id="ambGrid"></div>
</div>

<!-- PREVIEW OVERLAY -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <button class="preview-close" onclick="closePreview()">×</button>
    <div id="previewContent"></div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-head">
      <h2>Configurações do Editor</h2>
      <button class="settings-close" type="button" onclick="closeSettings()" aria-label="Fechar configurações">×</button>
    </div>
    <div class="settings-body">
      <aside class="settings-card">
        <h3>Logo da empresa</h3>
        <div class="logo-preview"><img id="settingsLogoPreview" alt="Logo atual"></div>
        <label class="file-input">
          Enviar logo
          <input type="file" id="logoUpload" accept="image/*" onchange="handleLogoUpload(this)" style="display:none">
        </label>
        <div class="settings-actions">
          <button class="ghost-btn" type="button" onclick="resetLogo()">Restaurar logo</button>
        </div>
      </aside>

      <section class="settings-card">
        <h3>Catálogos manuais</h3>
        <div class="catalog-form">
          <div class="field-group">
            <label>Tipo</label>
            <select id="catalogType">
              <option value="color">Cor / Material</option>
              <option value="handle">Puxador</option>
            </select>
          </div>
          <div class="field-group">
            <label>Fabricante</label>
            <select id="catalogManufacturer">
              <option value="BOA VISTA">Boa Vista</option>
              <option value="VITTA">Vitta</option>
            </select>
          </div>
          <div class="field-group">
            <label>Linha</label>
            <input type="text" id="catalogLine" placeholder="Ex: Guararapes">
          </div>
          <div class="field-group">
            <label>Cor / Modelo</label>
            <input type="text" id="catalogName" placeholder="Ex: Fontana">
          </div>
          <div class="field-group">
            <label>Qualidade</label>
            <select id="catalogQuality">
              <option value="">Sem qualidade</option>
              <option value="MDP">MDP</option>
              <option value="MDF">MDF</option>
              <option value="MDF / MDP">MDF / MDP</option>
            </select>
          </div>
          <div class="field-group">
            <label>Imagem</label>
            <input type="file" id="catalogImage" accept="image/*">
          </div>
          <div class="settings-actions field-full">
            <button class="hbtn" type="button" onclick="addManualCatalogItem()">Adicionar ao catálogo</button>
          </div>
        </div>
        <div class="catalog-list" id="manualCatalogList" style="margin-top:18px"></div>      </section>

      <section class="settings-card">
        <h3>Opções técnicas</h3>
        <div class="option-form">
          <div class="field-group"><label>Grupo</label><select id="optionGroup"><option value="tampon">Tamponamentos</option><option value="porta">Portas</option><option value="puxador">Puxadores</option><option value="corredica">Corrediças</option></select></div>
          <div class="field-group"><label>Opção</label><input type="text" id="optionName" placeholder="Ex: Telescópica"></div>
          <button class="hbtn" type="button" onclick="addMaterialOption()">Salvar</button>
        </div>
        <div class="option-list" id="materialOptionList"></div>
      </section>
    </div>
  </div>
</div>

<footer>
  <img id="footerLogo" src="https://dcorattopremium-5am4gqhj.manus.space/manus-storage/logo-transparent_c8b8c4c4.png" alt="D'coratto">
  <span>D'coratto Sob Medida · Editor de Projeto Inicial</span>
</footer>

<script src="/catalog/boa-vista/catalog.js"></script>
<script>

function escapeHTML(str) {
    if (!str) return '';
    const p = document.createElement('p');
    p.textContent = str;
    return p.innerHTML;
}

function escapeAttribute(str) {
    if (!str) return '';
    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ─── DATA ────────────────────────────────────────────────────────────────────

const LEGACY_COLORS = [
  {name:"BEGE DUNAS", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#C8B89A"},
  {name:"CARVALHO JARI", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#A0784A"},
  {name:"BRANCO SNOW", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#F5F3EF"},
  {name:"CINZA SAGRADO", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#8A8A8A"},
  {name:"GRAFITE", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#4A4A4A"},
  {name:"OFF WHITE", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#F0EDE6"},
  {name:"MACADAMIA", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#C4A882"},
  {name:"NUDE", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#D4B8A0"},
  {name:"PRETO PIANO", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#1A1A1A"},
  {name:"BRANCO POLAR", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#FAFAF8"},
  {name:"TERRA", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#8B6347"},
  {name:"CIMENTO", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#A0A09A"},
  {name:"AREIA", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#D4C4A8"},
  {name:"NOGUEIRA", manufacturer:"VITTA", line:"VITTA", quality:"", hex:"#6B4C32"},
];

const BOA_VISTA_COLORS = (window.BOA_VISTA_CATALOG || []).map(color => ({
  ...color,
  displayName: `${color.name}${color.quality ? ' / ' + color.quality : ''}`,
}));
const PORTFOLIO_STORAGE_KEY = 'dcoratto.portfolio.document.v1';
const CONFIG_STORAGE_KEY = 'dcoratto.editor.settings.v1';
const BUILDER_STORAGE_KEY = 'dcoratto.builder.document.v1';
const DEFAULT_LOGO = 'https://dcorattopremium-5am4gqhj.manus.space/manus-storage/logo-transparent_c8b8c4c4.png';
const DEFAULT_MATERIAL_OPTIONS = {
  tampon: ["15mm","25mm","15 e 25mm","6mm","15 e 6mm"],
  porta: ["LISA","CAVA 45°","PASSANTE","FRISO","ROMEU E JULIETA","AMERICANA","ESPELHO"],
  puxador: ["CAVA 45°","GARD 256mm","PASSANTE","LISA PASSANTE","LISA PASSANTE COM FRISO","EMBUTIDO","PUXADOR J","PUXADOR L"],
  corredica: ["Telescópica","Invisível","Slow Motion","Toque","Push Open"],
};
let editorSettings = loadEditorSettings();
let builderDraft = loadBuilderDraft();

function loadEditorSettings() {
  try {
    const settings = JSON.parse(localStorage.getItem(CONFIG_STORAGE_KEY) || 'null') || {};
    return {
      logo: settings.logo || DEFAULT_LOGO,
      catalogItems: settings.catalogItems || [],
      materialOptions: normalizeMaterialOptions(settings.materialOptions),
      observations: settings.observations || [
        "Apenas Marcenaria considerado no Projeto",
        "Apenas Marcenaria e Metalons considerados no Projeto",
        "Leds não inclusos",
        "Considerar cavas para instalação de LEDS",
        "Eletrodomésticos não inclusos",
      ],
    };
  } catch {
    return { logo: DEFAULT_LOGO, catalogItems: [], materialOptions: normalizeMaterialOptions(), observations: [] };
  }
}

function normalizeMaterialOptions(options = {}) {
  return Object.fromEntries(Object.entries(DEFAULT_MATERIAL_OPTIONS).map(([group, defaults]) => [
    group,
    [...new Set([...(options[group] || []), ...defaults])],
  ]));
}

function loadBuilderDraft() {
  try {
    return JSON.parse(localStorage.getItem(BUILDER_STORAGE_KEY) || 'null') || null;
  } catch {
    return null;
  }
}

function saveEditorSettings() {
  localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(editorSettings));
  postEditorEvent('settings_saved', { settings: editorSettings });
}

function manualCatalogItems(type) {
  return (editorSettings.catalogItems || []).filter(item => !type || item.type === type);
}

function applyEditorSettings() {
  const logo = editorSettings.logo || DEFAULT_LOGO;
  document.getElementById('companyLogo').src = logo;
  document.getElementById('footerLogo').src = logo;
  const logoPreview = document.getElementById('settingsLogoPreview');
  if (logoPreview) logoPreview.src = logo;
  renderManualCatalogList();
  renderMaterialOptionList();
  refreshPuxadorSelects();
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleLogoUpload(input) {
  const file = input.files?.[0];
  if (!file) return;
  editorSettings.logo = await fileToDataURL(file);
  saveEditorSettings();
  applyEditorSettings();
  syncPreviewDocument();
  input.value = '';
}

function resetLogo() {
  editorSettings.logo = DEFAULT_LOGO;
  saveEditorSettings();
  applyEditorSettings();
  syncPreviewDocument();
}

function openSettings() {
  applyEditorSettings();
  document.getElementById('settingsOverlay').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('active');
}

async function addManualCatalogItem() {
  const imageInput = document.getElementById('catalogImage');
  const file = imageInput.files?.[0];
  const type = document.getElementById('catalogType').value;
  const manufacturer = document.getElementById('catalogManufacturer').value;
  const line = document.getElementById('catalogLine').value.trim();
  const name = document.getElementById('catalogName').value.trim();
  const quality = document.getElementById('catalogQuality').value;
  if (!file || !line || !name) {
    alert('Preencha linha, cor/modelo e imagem.');
    return;
  }

  const textureUrl = await fileToDataURL(file);
  editorSettings.catalogItems = [
    ...(editorSettings.catalogItems || []),
    {
      id: crypto.randomUUID(),
      type,
      manufacturer,
      line,
      name,
      quality,
      hex: '#b8976a',
      textureUrl,
      source: 'manual',
    },
  ];
  saveEditorSettings();
  document.getElementById('catalogLine').value = '';
  document.getElementById('catalogName').value = '';
  document.getElementById('catalogQuality').value = '';
  imageInput.value = '';
  applyEditorSettings();
  rerenderAllSwatches();
  syncPreviewDocument();
}

function removeManualCatalogItem(id) {
  editorSettings.catalogItems = (editorSettings.catalogItems || []).filter(item => item.id !== id);
  saveEditorSettings();
  applyEditorSettings();
  rerenderAllSwatches();
  syncPreviewDocument();
}

function renderManualCatalogList() {
  const list = document.getElementById('manualCatalogList');
  if (!list) return;
  const items = editorSettings.catalogItems || [];
  list.innerHTML = items.length ? items.map(item => `
    <div class="catalog-item">
      <div class="catalog-thumb" style="background-image:url('${item.textureUrl}')"></div>
      <div class="catalog-meta">
        <span>${item.manufacturer} · ${item.type === 'handle' ? 'Puxador' : 'Cor'}</span>
        <strong>${item.name}${item.quality ? ' / '+item.quality : ''}</strong>
        <span>${item.line}</span>
        <button class="danger-btn" type="button" onclick="removeManualCatalogItem('${item.id}')">Remover</button>
      </div>
    </div>
  `).join('') : '<div class="amb-summary">Nenhum item manual cadastrado ainda.</div>';
}

function materialOptions(group) {
  editorSettings.materialOptions = normalizeMaterialOptions(editorSettings.materialOptions);
  if (group === 'puxador') return allPuxadores();
  return editorSettings.materialOptions[group] || [];
}

function addMaterialOption() {
  const group = document.getElementById('optionGroup').value;
  const input = document.getElementById('optionName');
  const value = input.value.trim();
  if (!value) return;
  editorSettings.materialOptions = normalizeMaterialOptions(editorSettings.materialOptions);
  editorSettings.materialOptions[group] = [...new Set([...(editorSettings.materialOptions[group] || []), value])];
  input.value = '';
  saveEditorSettings();
  renderMaterialOptionList();
  renderAmbientes();
  syncPreviewDocument();
}

function removeMaterialOption(group, value) {
  editorSettings.materialOptions = normalizeMaterialOptions(editorSettings.materialOptions);
  editorSettings.materialOptions[group] = (editorSettings.materialOptions[group] || []).filter(option => option !== value);
  AMBIENTES.forEach(amb => {
    if (state[amb.id]?.[group]) state[amb.id][group] = state[amb.id][group].filter(option => option !== value);
  });
  saveEditorSettings();
  renderMaterialOptionList();
  renderAmbientes();
  syncPreviewDocument();
}

function renderMaterialOptionList() {
  const list = document.getElementById('materialOptionList');
  if (!list) return;
  const labels = { tampon: 'Tamponamentos', porta: 'Portas', puxador: 'Puxadores', corredica: 'Corrediças' };
  editorSettings.materialOptions = normalizeMaterialOptions(editorSettings.materialOptions);
  list.innerHTML = Object.keys(labels).map(group => `
    <div class="option-card">
      <strong>${labels[group]}</strong>
      ${materialOptions(group).map(option => `
        <div class="option-row">
          <span>${option}</span>
          <button class="danger-btn" type="button" onclick="removeMaterialOption('${group}','${option.replace(/'/g, "\\'")}')">Remover</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function selectedFactories() {
  const selected = Array.from(document.querySelectorAll('#fabricante input[type="checkbox"]:checked')).map(o => o.value);
  return selected.length ? selected : ['VITTA', 'BOA VISTA'];
}

function availableColors() {
  const factories = selectedFactories();
  const manualColors = manualCatalogItems('color').filter(color => factories.includes(color.manufacturer));
  return [
    ...(factories.includes('VITTA') ? LEGACY_COLORS : []),
    ...(factories.includes('BOA VISTA') ? BOA_VISTA_COLORS : []),
    ...manualColors,
  ].sort((a, b) => `${a.manufacturer}-${a.line}-${a.name}`.localeCompare(`${b.manufacturer}-${b.line}-${b.name}`));
}

function allPuxadores() {
  const manualHandles = manualCatalogItems('handle').map(item => `${item.name}${item.line ? ' · '+item.line : ''}`);
  return [...new Set([...(editorSettings.materialOptions?.puxador || DEFAULT_MATERIAL_OPTIONS.puxador), ...manualHandles])];
}

function emptyEnvironmentState() {
  return { tampon:[], porta:[], puxador:[], corredica:[], cores:[], obs:[], obsExtra:'' };
}

function ensureEnvironmentState(ambId) {
  if (!state[ambId]) state[ambId] = emptyEnvironmentState();
  state[ambId].tampon ||= [];
  state[ambId].porta ||= [];
  state[ambId].puxador ||= [];
  state[ambId].corredica ||= [];
  state[ambId].cores ||= [];
  state[ambId].obs ||= [];
  state[ambId].obsExtra ||= '';
  return state[ambId];
}

AMBIENTES.forEach(a => ensureEnvironmentState(a.id));

if (builderDraft?.state) {
  AMBIENTES.forEach(a => {
    state[a.id] = {
      ...state[a.id],
      ...(builderDraft.state[a.id] || {}),
      tampon: builderDraft.state[a.id]?.tampon || [],
      porta: builderDraft.state[a.id]?.porta || [],
      puxador: builderDraft.state[a.id]?.puxador || [],
      corredica: builderDraft.state[a.id]?.corredica || [],
      cores: builderDraft.state[a.id]?.cores || [],
      obs: builderDraft.state[a.id]?.obs || [],
    };
  });
}

function buildSwatchHTML(ambId, field) {
  const colors = availableColors();
  if (!colors.length) return '<div class="amb-summary">Selecione um fabricante para ver as cores.</div>';
  return colors.map(c => {
    const key = `${c.manufacturer || ''}|${c.line || ''}|${c.name}|${c.quality || ''}`;
    const selected = state[ambId]?.cores.some(item => item.key === key || (!item.key && item.name === c.name));
    return `
    <div class="swatch-wrap">
      <div class="swatch ${selected ? 'selected' : ''}" title="${c.manufacturer} · ${c.line} · ${c.displayName || c.name}"
        style="${c.textureUrl ? `background-image:url('${c.textureUrl}');background-color:${c.hex}` : `background:${c.hex}`}"
        onclick="toggleColor('${ambId}','${c.name}','${c.hex}',this,'${c.textureUrl || ''}','${c.manufacturer || ''}','${c.line || ''}','${c.quality || ''}')">
      </div>
      <div class="swatch-name">${c.name}</div>
      <div class="swatch-line">${c.line || c.manufacturer || ''}</div>
    </div>`;
  }).join('');
}

function buildSelectHTML(options, multiple=false) {
  return options.map(o => `<option value="${o}">${o}</option>`).join('');
}

function buildCheckboxHTML(ambId, field) {
  return materialOptions(field).map(option => {
    const selected = state[ambId]?.[field]?.includes(option);
    return `
      <label class="check-item">
        <input type="checkbox" ${selected ? 'checked' : ''} onchange="updateCheckbox('${ambId}','${field}','${option.replace(/'/g, "\\'")}',this.checked)">
        ${option}
      </label>
    `;
  }).join('') || '<div class="amb-summary">Cadastre opções nas configurações.</div>';
}

function buildObsHTML(ambId) {
  return obsOptions().map((o,i) => {
    const selected = state[ambId]?.obs.includes(o);
    return `
    <span class="obs-item">
      <button class="obs-btn ${selected ? 'selected' : ''}" onclick="toggleObs('${ambId}',${i},this)">${o}</button>
      <button class="obs-edit" type="button" title="Editar observação" onclick="editObservation('${ambId}',${i})">✎</button>
    </span>
  `;
  }).join('');
}

function buildHandlePickerHTML(ambId) {
  const factories = selectedFactories();
  const handles = manualCatalogItems('handle').filter(item => factories.includes(item.manufacturer));
  if (!handles.length) return '';
  return `
    <div class="handle-picker">
      ${handles.map(item => {
        const value = `${item.name}${item.line ? ' · '+item.line : ''}`;
        const selected = state[ambId].puxador.includes(value);
        return `
          <button class="handle-card ${selected ? 'selected' : ''}" type="button" onclick="toggleHandle('${ambId}','${value}')">
            <img src="${item.textureUrl}" alt="${item.name}">
            <span>${item.name}</span>
            <span>${item.line}</span>
          </button>
        `;
      }).join('')}
    </div>
  `;
}

function addEnvironment() {
  const nextNumber = AMBIENTES.length + 1;
  const name = prompt('Nome do ambiente', `Ambiente ${nextNumber}`);
  if (!name) return;
  const id = `amb-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`;
  AMBIENTES.push({ id, name: name.trim(), img: DEFAULT_AMBIENTE_IMG });
  ensureEnvironmentState(id);
  renderAmbientes();
  syncPreviewDocument();
  setTimeout(() => toggleCard(id), 0);
}

function removeEnvironment(ambId) {
  const amb = AMBIENTES.find(item => item.id === ambId);
  if (!amb || !confirm(`Remover o ambiente "${amb.name}" deste projeto?`)) return;
  AMBIENTES = AMBIENTES.filter(item => item.id !== ambId);
  delete state[ambId];
  renderAmbientes();
  syncPreviewDocument();
}

function renameEnvironment(ambId, value) {
  const amb = AMBIENTES.find(item => item.id === ambId);
  if (!amb) return;
  amb.name = value.trim() || 'Ambiente';
  const name = document.querySelector(`#card-${ambId} .amb-name`);
  if (name) name.textContent = amb.name;
  syncPreviewDocument();
}

function renderCard(amb) {
  const s = ensureEnvironmentState(amb.id);
  return `
  <div class="amb-card" id="card-${amb.id}">
    <div class="amb-header" onclick="toggleCard('${amb.id}')">
      <img class="amb-thumb" src="${amb.img}" alt="${escapeAttribute(amb.name)}">
      <div class="amb-info">
        <div class="amb-name">${escapeHTML(amb.name)}</div>
        <div class="amb-summary" id="summary-${amb.id}">Clique para configurar</div>
      </div>
      <div class="amb-actions">
        <button class="amb-remove" type="button" onclick="event.stopPropagation();removeEnvironment('${amb.id}')">Remover</button>
        <span class="amb-toggle">▾</span>
      </div>
    </div>
    <div class="amb-body">
      <div class="amb-fields">
        <div class="field-group field-full">
          <label>Nome do ambiente</label>
          <input type="text" value="${escapeAttribute(amb.name)}" oninput="renameEnvironment('${amb.id}',this.value)">
        </div>
        <div class="field-group">
          <label>Tamponamentos</label>
          <div class="check-grid">${buildCheckboxHTML(amb.id,'tampon')}</div>
        </div>
        <div class="field-group">
          <label>Portas</label>
          <div class="check-grid">${buildCheckboxHTML(amb.id,'porta')}</div>
        </div>
        <div class="field-group">
          <label>Puxadores</label>
          <div class="check-grid" data-field="puxador">${buildCheckboxHTML(amb.id,'puxador')}</div>
          ${buildHandlePickerHTML(amb.id)}
        </div>
        <div class="field-group">
          <label>Corrediças</label>
          <div class="check-grid">${buildCheckboxHTML(amb.id,'corredica')}</div>
        </div>
        <div class="field-group">
          <label>Obs adicional</label>
          <input type="text" placeholder="Texto livre..." value="${s.obsExtra || ''}" oninput="state['${amb.id}'].obsExtra=this.value;syncPreviewDocument()">
        </div>
      </div>

      <div class="color-picker-area">
        <span class="color-picker-label">Cores · clique para selecionar (pode escolher mais de uma)</span>
        <div class="color-swatches">${buildSwatchHTML(amb.id)}</div>
        <div class="selected-colors" id="selcolors-${amb.id}"></div>
      </div>

      <div style="margin-top:16px">
        <div class="obs-tools">
          <span class="color-picker-label" style="margin-bottom:0">Observações do projeto</span>
          <button class="obs-add" type="button" onclick="addObservation('${amb.id}')" title="Adicionar observação">+</button>
        </div>
        <div class="obs-options">${buildObsHTML(amb.id)}</div>
      </div>
    </div>
  </div>`;
}

function renderAmbientes() {
  const grid = document.getElementById('ambGrid');
  grid.innerHTML = AMBIENTES.length
    ? AMBIENTES.map(renderCard).join('')
    : '<div class="empty-ambientes" style="grid-column:1/-1">Nenhum ambiente cadastrado. Clique em Adicionar ambiente para começar.</div>';
  hydrateBuilderControls();
  updateProgress();
}
applyEditorSettings();
renderAmbientes();

function handleFactoryChange() {
  const factories = selectedFactories();
  AMBIENTES.forEach(amb => {
    state[amb.id].cores = state[amb.id].cores.filter(c => !c.manufacturer || factories.includes(c.manufacturer));
    const swatches = document.querySelector(`#card-${amb.id} .color-swatches`);
    if (swatches) swatches.innerHTML = buildSwatchHTML(amb.id);
    renderSelectedColors(amb.id);
    updateSummary(amb.id);
  });
  refreshPuxadorSelects();
  updateProgress();
  syncPreviewDocument();
}

function rerenderAllSwatches() {
  AMBIENTES.forEach(amb => {
    const swatches = document.querySelector(`#card-${amb.id} .color-swatches`);
    if (swatches) swatches.innerHTML = buildSwatchHTML(amb.id);
  });
}

function refreshPuxadorSelects() {
  AMBIENTES.forEach(amb => {
    const card = document.querySelector(`#card-${amb.id} [data-field="puxador"]`)?.parentElement;
    const grid = card?.querySelector('[data-field="puxador"]');
    if (grid) grid.innerHTML = buildCheckboxHTML(amb.id, 'puxador');
    const oldPicker = card?.querySelector('.handle-picker');
    if (oldPicker) oldPicker.remove();
    card?.insertAdjacentHTML('beforeend', buildHandlePickerHTML(amb.id));
  });
}

function hydrateBuilderControls() {
  if (builderDraft?.fields) {
    document.getElementById('clientName').value = builderDraft.fields.clientName || '';
    document.getElementById('contractNum').value = builderDraft.fields.contractNum || '';
    document.getElementById('endereco').value = builderDraft.fields.endereco || '';
    const factories = builderDraft.fields.factories?.length ? builderDraft.fields.factories : ['VITTA', 'BOA VISTA'];
    document.querySelectorAll('#fabricante input[type="checkbox"]').forEach(input => {
      input.checked = factories.includes(input.value);
    });
  }

  AMBIENTES.forEach(amb => {
    const s = ensureEnvironmentState(amb.id);
    const extra = document.querySelector(`#card-${amb.id} input[placeholder="Texto livre..."]`);
    if (extra) extra.value = s.obsExtra || '';
    renderSelectedColors(amb.id);
    updateSummary(amb.id);
  });
  rerenderAllSwatches();
  refreshPuxadorSelects();
  updateProgress();
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('active');
  updateProgress();
}

function updateMulti(ambId, field, sel) {
  state[ambId][field] = Array.from(sel.selectedOptions).map(o => o.value);
  updateSummary(ambId);
  refreshPuxadorSelects();
  syncPreviewDocument();
}

function updateCheckbox(ambId, field, value, checked) {
  const s = ensureEnvironmentState(ambId);
  const current = new Set(s[field] || []);
  if (checked) current.add(value);
  else current.delete(value);
  s[field] = [...current];
  updateSummary(ambId);
  updateProgress();
  syncPreviewDocument();
}

function toggleHandle(ambId, value) {
  const list = state[ambId].puxador;
  const index = list.indexOf(value);
  if (index > -1) list.splice(index, 1);
  else list.push(value);
  document.querySelectorAll(`#card-${ambId} [data-field="puxador"] input[type="checkbox"]`).forEach(input => {
    input.checked = list.includes(input.parentElement.textContent.trim());
  });
  refreshPuxadorSelects();
  updateSummary(ambId);
  syncPreviewDocument();
}

function toggleColor(ambId, name, hex, el, textureUrl='', manufacturer='', line='', quality='') {
  const s = state[ambId].cores;
  const key = `${manufacturer}|${line}|${name}|${quality}`;
  const idx = s.findIndex(c => c.key === key || (!c.key && c.name === name));
  if (idx > -1) {
    s.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    s.push({key, name, hex, textureUrl, manufacturer, line, quality});
    el.classList.add('selected');
  }
  renderSelectedColors(ambId);
  updateSummary(ambId);
  syncPreviewDocument();
}

function renderSelectedColors(ambId) {
  const container = document.getElementById('selcolors-'+ambId);
  container.innerHTML = state[ambId].cores.map(c => `
    <div class="sel-tag">
      <div style="width:12px;height:12px;border-radius:2px;background:${c.hex};${c.textureUrl ? `background-image:url('${c.textureUrl}');background-size:cover;background-position:center;` : ''}flex-shrink:0"></div>
      ${c.name}${c.quality ? ' / '+c.quality : ''}
      <span class="rm" onclick="removeColor('${ambId}','${c.key || c.name}')">×</span>
    </div>`).join('');
}

function removeColor(ambId, key) {
  const s = state[ambId].cores;
  const idx = s.findIndex(c => (c.key || c.name) === key || c.name === key);
  const removed = idx > -1 ? s[idx] : null;
  if (idx > -1) s.splice(idx, 1);
  renderSelectedColors(ambId);
  // Deselect swatch
  document.querySelectorAll('#card-'+ambId+' .swatch').forEach((sw,i) => {
    const color = availableColors()[i];
    if (removed && color && color.name === removed.name && color.line === removed.line) sw.classList.remove('selected');
  });
  updateSummary(ambId);
  syncPreviewDocument();
}

function toggleObs(ambId, idx, btn) {
  const s = state[ambId].obs;
  const val = obsOptions()[idx];
  const i = s.indexOf(val);
  if (i > -1) { s.splice(i,1); btn.classList.remove('selected'); }
  else { s.push(val); btn.classList.add('selected'); }
  syncPreviewDocument();
}

function rerenderObservations() {
  AMBIENTES.forEach(amb => {
    const options = document.querySelector(`#card-${amb.id} .obs-options`);
    if (options) options.innerHTML = buildObsHTML(amb.id);
  });
}

function addObservation(ambId) {
  const text = prompt('Nova observação do projeto:');
  const value = (text || '').trim();
  if (!value) return;
  if (!editorSettings.observations.includes(value)) {
    editorSettings.observations.push(value);
    saveEditorSettings();
  }
  const applyAll = confirm('Aplicar esta observação em todos os ambientes? OK = todos, Cancelar = apenas este ambiente.');
  const targetIds = applyAll ? AMBIENTES.map(a => a.id) : [ambId];
  targetIds.forEach(id => {
    if (!state[id].obs.includes(value)) state[id].obs.push(value);
  });
  rerenderObservations();
  syncPreviewDocument();
}

function editObservation(ambId, idx) {
  const oldValue = obsOptions()[idx];
  const text = prompt('Editar observação:', oldValue);
  const newValue = (text || '').trim();
  if (!newValue || newValue === oldValue) return;
  const applyAll = confirm('Aplicar esta edição nos ambientes que usam esta observação? OK = todos, Cancelar = apenas este ambiente.');
  editorSettings.observations[idx] = newValue;
  saveEditorSettings();
  const targetIds = applyAll ? AMBIENTES.map(a => a.id) : [ambId];
  targetIds.forEach(id => {
    const position = state[id].obs.indexOf(oldValue);
    if (position > -1) state[id].obs[position] = newValue;
  });
  rerenderObservations();
  syncPreviewDocument();
}

function updateSummary(ambId) {
  const s = state[ambId];
  const parts = [];
  if (s.cores.length) parts.push(s.cores.map(c=>c.name).join(', '));
  if (s.porta.length) parts.push('Porta: '+s.porta.join(', '));
  if (s.puxador.length) parts.push('Puxador: '+s.puxador.join(', '));
  if (s.corredica.length) parts.push('Corrediça: '+s.corredica.join(', '));
  const el = document.getElementById('summary-'+ambId);
  if (el) el.textContent = parts.length ? parts.join(' · ') : 'Clique para configurar';
};

function updateProgress() {
  const done = AMBIENTES.filter(a => {
    const s = state[a.id];
    return s.cores.length > 0 || s.porta.length > 0 || s.tampon.length > 0 || s.puxador.length > 0 || s.corredica.length > 0;
  }).length;
  document.getElementById('progressFill').style.width = (AMBIENTES.length ? done/AMBIENTES.length*100 : 0)+'%';
}

function hasEnvironmentData(s) {
  return s.cores.length || s.porta.length || s.tampon.length || s.puxador.length || s.corredica.length || s.obs.length || s.obsExtra;
}

function buildPreviewDocumentData() {
  const clientName = document.getElementById('clientName').value || 'CLIENTE MODELO';
  const endereco = document.getElementById('endereco').value || '';
  const contractNum = document.getElementById('contractNum').value || '';
  const environments = AMBIENTES
    .map((amb, index) => {
      const s = state[amb.id];
      return {
        number: String(index + 1).padStart(2, '0'),
        title: amb.name,
        specs: {
          tamponamentos: s.tampon.join(', '),
          portas: s.porta.join(', '),
          puxadores: s.puxador.join(', '),
          corredicas: s.corredica.join(', '),
        },
        colors: s.cores,
        notes: [...s.obs, s.obsExtra || ''].filter(Boolean),
        layout: 'single',
        photos: [{ title: 'Imagem do ambiente', src: amb.img }],
        hasData: Boolean(hasEnvironmentData(s)),
      };
    })
    .filter(environment => environment.hasData);

  return {
    projectType: 'Projeto Inicial',
    year: new Date().getFullYear(),
    branding: {
      logo: editorSettings.logo || DEFAULT_LOGO,
      companyName: "D'Coratto Sob Medida",
    },
    client: {
      name: clientName,
      address: endereco,
      contractNumber: contractNum,
      manufacturers: selectedFactories(),
    },
    environments: environments.length ? environments : [],
  };
}

function saveBuilderDraft() {
  const draft = {
    fields: {
      clientName: document.getElementById('clientName').value || '',
      contractNum: document.getElementById('contractNum').value || '',
      endereco: document.getElementById('endereco').value || '',
      factories: selectedFactories(),
    },
    ambientes: AMBIENTES,
    state,
    updatedAt: new Date().toISOString(),
  };
  localStorage.setItem(BUILDER_STORAGE_KEY, JSON.stringify(draft));
  return draft;
}

function postEditorEvent(action, payload = {}) {
  if (window.parent === window) return;
  window.parent.postMessage({
    type: 'dcoratto:editor-state',
    action,
    ...payload,
    sentAt: new Date().toISOString(),
  }, window.location.origin);
}

function syncPreviewDocument(action = 'editor_sync') {
  const draft = saveBuilderDraft();
  const preview = buildPreviewDocumentData();
  localStorage.setItem(PORTFOLIO_STORAGE_KEY, JSON.stringify(preview));
  postEditorEvent(action, { draft, preview });
}

['clientName', 'contractNum', 'endereco'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', syncPreviewDocument);
});
syncPreviewDocument();

// ─── GENERATE ─────────────────────────────────────────────────────────────────

function generatePreview() {
  syncPreviewDocument('generate_project_initial');
  const clientName = document.getElementById('clientName').value || 'CLIENTE MODELO';
  const contractNum = document.getElementById('contractNum').value || '—';
  const fabricante = selectedFactories().join(' + ') || '—';
  const endereco = document.getElementById('endereco').value || '—';

  let html = `
  <div style="font-family:'Cormorant Garamond',serif;color:#1a1a1a;max-width:900px">
    <div style="text-align:center;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid #ddd">
      <div style="font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#b8976a;margin-bottom:8px">Projeto Inicial</div>
      <div style="font-size:36px;font-weight:300;margin-bottom:4px">${clientName}</div>
      <div style="font-size:13px;color:#666;font-family:'Montserrat',sans-serif;font-weight:300">Contrato: ${contractNum} · ${fabricante}</div>
      <div style="font-size:12px;color:#999;font-family:'Montserrat',sans-serif;font-weight:300;margin-top:4px">${endereco}</div>
    </div>`;

  AMBIENTES.forEach(amb => {
    const s = state[amb.id];
    const hasData = s.cores.length||s.porta.length||s.tampon.length||s.puxador.length||s.corredica.length;
    if (!hasData) return;

    const allObs = [...s.obs, s.obsExtra||''].filter(Boolean).join(' · ');

    html += `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:32px;margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid #eee;align-items:start">
      <div>
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#b8976a;margin-bottom:6px;font-family:'Montserrat',sans-serif">Ambiente</div>
        <div style="font-size:32px;font-weight:300;margin-bottom:16px">${amb.name}</div>
        <img src="${amb.img}" style="width:100%;height:280px;object-fit:cover;border-radius:2px;display:block">
        ${allObs ? `<div style="margin-top:10px;font-size:11px;color:#e05;font-family:'Montserrat',sans-serif;letter-spacing:.05em">${allObs}</div>` : ''}
      </div>
      <div style="padding-top:52px">
        ${s.tampon.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Tamponamentos</div><div style="font-size:14px;color:#555">${s.tampon.join(', ')}</div></div>` : ''}
        ${s.porta.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Portas</div><div style="font-size:14px;color:#555">${s.porta.join(', ')}</div></div>` : ''}
        ${s.puxador.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Puxadores</div><div style="font-size:14px;color:#555">${s.puxador.join(', ')}</div></div>` : ''}
        ${s.corredica.length ? `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:4px">Corrediças</div><div style="font-size:14px;color:#555">${s.corredica.join(', ')}</div></div>` : ''}
        ${s.cores.length ? `
        <div><div style="font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;margin-bottom:12px">Cores</div>
        <div style="display:flex;flex-wrap:wrap;gap:12px">
          ${s.cores.map(c=>`
          <div style="text-align:center">
            <div style="width:52px;height:52px;border-radius:4px;background:${c.hex};${c.textureUrl ? `background-image:url('${c.textureUrl}');background-size:cover;background-position:center;` : ''}border:1px solid rgba(0,0,0,.1)"></div>
            <div style="font-size:10px;margin-top:4px;color:#555;font-family:'Montserrat',sans-serif">${c.name}${c.quality ? ' / '+c.quality : ''}</div>
          </div>`).join('')}
        </div></div>` : ''}
      </div>
    </div>`;
  });

  html += `</div>`;
  
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewOverlay').classList.add('active');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePreview(); });
</script>
</body>
</html>
